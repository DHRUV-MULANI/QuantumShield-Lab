  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #run-btn:disabled { background: rgba(255,255,255,0.05); color: var(--text3); cursor: not-allowed; transform: none; box-shadow: none; }

  @keyframes logIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .log-entry .log-time { opacity: 0.4; margin-right: 8px; }
  .log-entry.info    { background: rgba(55,65,81,0.4);  border-color: rgba(75,85,99,0.5);   color: #d1d5db; }
  .log-entry.alice   { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.25); color: #a5b4fc; }
  .log-entry.bob     { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.25); color: #6ee7b7; }
  .log-entry.eve     { background: rgba(239,68,68,0.08);  border-color: rgba(239,68,68,0.3);   color: #fca5a5; }
  .log-entry.success { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.5);  color: #34d399; font-weight: 600; }
  .log-entry.math    { background: rgba(168,85,247,0.08); border-color: rgba(168,85,247,0.25); color: #d8b4fe; font-size: 0.73rem; }
  .log-entry.warn    { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.3);  color: #fbbf24; }

  /* ── SVG & Animation utilities ── */
  .packet { transition: cx 1.2s cubic-bezier(0.4,0,0.2,1), cy 1.2s cubic-bezier(0.4,0,0.2,1); }

<script>
// ════════════════════════════════════════
//  DATA
// ════════════════════════════════════════
const TOPICS = [
  {
    id: 'ntru', name: 'NTRU', type: 'Post-Quantum', cat: 'network',
    logic: "NTRU avoids prime factorization (vulnerable to Shor's quantum algorithm) by working in polynomial rings ℤ[x]/(xᴺ−1). Security relies on the Shortest Vector Problem (SVP) in a lattice — believed to be quantum-resistant. Encryption adds blinding noise r(x)·h(x) to mask the message.",
    encryptSteps: [
      "Represent message as polynomial m(x) ∈ ℤp[x]/(xᴺ−1)",
      "Choose random blinding polynomial r(x) (noise/salt)",
      "Bob's public key h(x) = p·f⁻¹(x)·g(x) mod q",
      "Ciphertext: c(x) = p·r(x)·h(x) + m(x)  mod q"
    ],
    decryptSteps: [
      "Compute a(x) = f(x)·c(x) mod q (choose closest lift to [-q/2, q/2])",
      "Noise drops out: a(x) ≡ p·g(x)·r(x) + f(x)·m(x) mod p",
      "Because coefficients are small, reduce mod p to get f(x)·m(x)",
      "Multiply by f⁻¹(x) mod p to recover m(x)"
    ],
    alice: [
      { id: 'm', label: 'Message Poly m(x)', val: '1 - x + x^2', type: 'text' },
      { id: 'r', label: 'Blinding Poly r(x)', val: 'x - x^3',   type: 'text' }
    ],
    bob: [
      { id: 'p', label: 'Prime p', val: '3',  type: 'number' },
      { id: 'q', label: 'Modulo q', val: '32', type: 'number' }
    ]
  },
  {
    id: 'fhe', name: 'Fully Homomorphic Encryption', type: 'Cloud Security', cat: 'network',
    logic: "FHE (Gentry, 2009) lets a cloud server compute on encrypted data without decrypting it. Based on the Learning With Errors (LWE) problem — adding secret noise that only the key-holder can remove. Operations on ciphertexts mirror operations on plaintexts: E(a)⊕E(b) = E(a+b).",
    encryptSteps: [
      "Alice holds secret key s. Encrypt: E(a) = a + 2·noise + 2·B·s  mod large N",
      "E(b) = b + 2·noise' + 2·B'·s  mod N",
      "Send encrypted values E(a), E(b) to cloud server"
    ],
    decryptSteps: [
      "Cloud computes: E(result) = E(a) OP E(b)  (homomorphic operation)",
      "Cloud has no key — sees only noisy ciphertext",
      "Alice decrypts using secret key s → result = (E(result) - 2·B_result·s) mod 2"
    ],
    alice: [
      { id: 'a', label: 'Data Point A', val: '15', type: 'number' },
      { id: 'b', label: 'Data Point B', val: '27', type: 'number' }
    ],
    bob: [
      { id: 'op', label: 'Operation', val: '+', type: 'select', options: [{v:'+',l:'Addition (+)'},{v:'*',l:'Multiplication (×)'}] }
    ]
  },
  {
    id: 'ecc', name: 'Elliptic Curve Cryptography', type: 'Public Key', cat: 'geometry-ecc',
    logic: "ECC uses the group law on y² = x³ + ax + b over 𝔽p. Point addition P+Q is defined geometrically: draw a line through P, Q; it intersects the curve at −R; reflect over x-axis to get R. The ECDLP (given P and kP, find k) is computationally intractable — this is the trapdoor.",
    encryptSteps: [
      "Map message M to a curve point. Pick random k ∈ [1, n−1]",
      "Compute C₁ = k·G (G is the generator point)",
      "Compute C₂ = M + k·Qₐ  (Qₐ = Alice's public key)",
      "Ciphertext = (C₁, C₂)"
    ],
    decryptSteps: [
      "Receive (C₁, C₂) from sender",
      "Compute S = dₐ·C₁  (dₐ = Alice's private key)",
      "Note: S = dₐ·k·G = k·Qₐ",
      "Recover M = C₂ − S  (EC point subtraction)"
    ],
    alice: [
      { id: 'M', label: 'Message Point M', val: 'P(5,7)', type: 'text' },
      { id: 'k', label: 'Random k', val: '4', type: 'number' }
    ],
    bob: [
      { id: 'privKey', label: 'Private Key dₐ', val: '7', type: 'number' }
    ]
  },
  {
    id: 'ecdh', name: 'ECDH Key Exchange', type: 'Key Exchange', cat: 'network',
    logic: "ECDH lets Alice and Bob agree on a shared secret over a public channel without transmitting the secret. Both compute the same point a·b·G = S using their own private key and the other's public point. An eavesdropper sees A=a·G and B=b·G but cannot compute a·b·G without solving ECDLP.",
    encryptSteps: [
      "Alice picks private a, computes public A = a·G",
      "Bob picks private b, computes public B = b·G",
      "Alice sends A, Bob sends B — these are public values"
    ],
    decryptSteps: [
      "Alice computes S = a·B = a·b·G",
      "Bob computes S = b·A = b·a·G",
      "Both arrive at same shared secret S = ab·G",
      "Use S as AES key or KDF input — never transmitted!"
    ],
    alice: [
      { id: 'a', label: 'Private a', val: '12', type: 'number' }
    ],
    bob: [
      { id: 'b', label: 'Private b', val: '7', type: 'number' }
    ]
  },
  {
    id: 'hasse', name: "Hasse's Theorem", type: 'ECC Theory', cat: 'geometry-ecc',
    logic: "Hasse's Theorem bounds the group order #E(𝔽p): |#E(𝔽p) − (p+1)| ≤ 2√p. This tells us approximately how many points exist on an elliptic curve over 𝔽p. For cryptographic use, we need #E(𝔽p) to have a large prime factor (Schoof's algorithm computes it exactly) to avoid small-subgroup attacks.",
    encryptSteps: [

//  MATH HELPERS (Real Calculations)
// ════════════════════════════════════════
function parseVec(s) {
  const nums = s.replace(/[\[\]]/g,'').split(',').map(v => parseFloat(v.trim()));
  return nums.length === 2 && !nums.some(isNaN) ? nums : [1, 0];
}
function vecNorm(v) { return Math.sqrt(v[0]*v[0] + v[1]*v[1]); }
function dot(a, b) { return a[0]*b[0] + a[1]*b[1]; }
function vecSub(a, b) { return [a[0]-b[0], a[1]-b[1]]; }
function vecAdd(a, b) { return [a[0]+b[0], a[1]+b[1]]; }
function vecScale(v, s) { return [v[0]*s, v[1]*s]; }
function roundi(x) { return Math.round(x); }
function fmt(v, d=3) { return typeof v === 'number' ? v.toFixed(d).replace(/\.?0+$/,'') : v; }
function hadamard(v1, v2) { return Math.sqrt(Math.abs(v1[0]*v2[1]-v1[1]*v2[0]) / (vecNorm(v1)*vecNorm(v2))); }

// Lattice reduction (2D SVP / Gauss reduction)
function gaussReduce(v1, v2) {
  let a = [...v1], b = [...v2];
  let iter = 0, steps = [];
  while (iter++ < 50) {
    if (vecNorm(a) > vecNorm(b)) { [a, b] = [b, a]; steps.push(`Swap: v₁↔v₂ → v₁=(${a[0]},${a[1]}), v₂=(${b[0]},${b[1]})`); }
    const t = roundi(dot(a, b) / dot(a, a));
    if (t === 0) break;
    b = vecSub(b, vecScale(a, t));
    steps.push(`t=round(${fmt(dot(vecAdd(b,vecScale(a,t)),a)/dot(a,a),3)})=${t} → v₂ ← v₂ − ${t}v₁ = (${b[0]},${b[1]})`);
  }
  return { v1: a, v2: b, steps };
}

// Babai CVP (2D)
function babaiCVP(basis1, basis2, w) {
  const det = basis1[0]*basis2[1] - basis1[1]*basis2[0];
  if (Math.abs(det) < 1e-10) return { v: w, t1: 0, t2: 0 };
  const t1 = (w[0]*basis2[1] - w[1]*basis2[0]) / det;
  const t2 = (basis1[0]*w[1] - basis1[1]*w[0]) / det;
  const a1 = roundi(t1), a2 = roundi(t2);
  const v = vecAdd(vecScale(basis1, a1), vecScale(basis2, a2));
  const dist = vecNorm(vecSub(w, v));
  return { v, t1, t2, a1, a2, dist };
}

function mkFields(fields, tid) {
  const row = document.createElement('div');
  row.className = 'param-row';
  fields.forEach(f => {
    const d = document.createElement('div'); d.className = 'param-field';
    if (f.type === 'select') {
      d.innerHTML = `<label>${f.label}</label>
        <select id="p-${tid}-${f.id}" onchange="updateParam('${tid}','${f.id}',this.value)">
          ${f.options.map(o=>`<option value="${o.v}"${params[tid][f.id]===o.v?' selected':''}>${o.l}</option>`).join('')}

    } else {
      d.innerHTML = `<label>${f.label}</label>

          oninput="updateParam('${tid}','${f.id}',this.value)" />`;
    }
    row.appendChild(d);
  });
  return row.outerHTML;
}

function buildLatticeSVG(t) {
  const v1 = parseVec(params[t.id]?.v1 || '[4,1]');
  const v2 = parseVec(params[t.id]?.v2 || '[1,3]');
  const w  = parseVec(params[t.id]?.w  || '[5.2,3.8]');
  const cx = 300, cy = 150, sc = 35;

  // Generate lattice points
  let dots = '';
  for (let i = -5; i <= 5; i++) {
    for (let j = -5; j <= 5; j++) {
      const x = cx + (v1[0]*i + v2[0]*j)*sc;
      const y = cy - (v1[1]*i + v2[1]*j)*sc;
      if (x > 20 && x < 580 && y > 10 && y < 290) {
        dots += `<circle cx="${x}" cy="${y}" r="3" fill="#374151" opacity="0.7"/>`;
      }
    }
  }

  // Basis vectors from origin
  const bx1 = cx + v1[0]*sc, by1 = cy - v1[1]*sc;
  const bx2 = cx + v2[0]*sc, by2 = cy - v2[1]*sc;

  let extra = '';
  if (t.id === 'svp') {
    // Reduction steps
    const red = gaussReduce([...v1], [...v2]);
    const rv1 = red.v1, rv2 = red.v2;
    const rx1 = cx + rv1[0]*sc, ry1 = cy - rv1[1]*sc;
    extra = `
      <line x1="${cx}" y1="${cy}" x2="${rx1}" y2="${ry1}" stroke="#10b981" stroke-width="5" opacity="0.9" marker-end="url(#arrG)"/>
      <circle cx="${rx1}" cy="${ry1}" r="7" fill="#10b981" opacity="0.95"/>
      <rect x="${rx1+8}" y="${ry1-22}" width="160" height="22" rx="5" fill="rgba(6,30,20,0.9)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
      <text x="${rx1+16}" y="${ry1-7}" fill="#34d399" font-size="11" font-family="JetBrains Mono,monospace" font-weight="700">Shortest: (${rv1[0]},${rv1[1]}) ‖${vecNorm(rv1).toFixed(2)}‖</text>
      <text x="${cx+4}" y="${cy-8}" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">O</text>
    `;
  }
  if (t.id === 'cvp') {
    const res = babaiCVP(v1, v2, w);
    const wx = cx + w[0]*sc, wy = cy - w[1]*sc;
    const vx = cx + res.v[0]*sc, vy = cy - res.v[1]*sc;
    extra = `
      <line x1="${vx}" y1="${vy}" x2="${wx}" y2="${wy}" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5 3"/>
      <circle cx="${wx}" cy="${wy}" r="8" fill="#ef4444" opacity="0.9" class="pulse-anim"/>
      <circle cx="${vx}" cy="${vy}" r="8" fill="#10b981"/>
      <text x="${wx+12}" y="${wy-6}" fill="#fca5a5" font-size="11" font-family="JetBrains Mono,monospace">w${w}</text>
      <text x="${vx+12}" y="${vy+16}" fill="#34d399" font-size="11" font-family="JetBrains Mono,monospace">v=(${res.v[0].toFixed(1)},${res.v[1].toFixed(1)}) ‖${res.dist.toFixed(2)}‖</text>
      <text x="${cx+4}" y="${cy-8}" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">O</text>
    `;
  }

  return `<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrI" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6366f1"/></marker>
      <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#10b981"/></marker>
      <filter id="glow3"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    ${dots}
    <!-- Basis v1 -->
    <line x1="${cx}" y1="${cy}" x2="${bx1}" y2="${by1}" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrI)"/>
    <text x="${bx1+6}" y="${by1-4}" fill="#818cf8" font-size="12" font-family="JetBrains Mono,monospace">v₁(${v1[0]},${v1[1]})</text>
    <!-- Basis v2 -->
    <line x1="${cx}" y1="${cy}" x2="${bx2}" y2="${by2}" stroke="#a855f7" stroke-width="2.5" marker-end="url(#arrI)"/>
    <text x="${bx2+6}" y="${by2-4}" fill="#c084fc" font-size="12" font-family="JetBrains Mono,monospace">v₂(${v2[0]},${v2[1]})</text>
    <circle cx="${cx}" cy="${cy}" r="5" fill="white" filter="url(#glow3)"/>
    ${extra}
    <text x="16" y="282" fill="#4b5563" font-size="10" font-family="Inter,sans-serif">Hadamard H(B) = ${hadamard(v1,v2).toFixed(4)}</text>
  </svg>`;
}

// ════════════════════════════════════════
//  EVE TOGGLE
// ════════════════════════════════════════
function toggleEve() {
  eveActive = !eveActive;
  const btn = document.getElementById('eve-toggle');
  btn.classList.toggle('active', eveActive);
  document.getElementById('eve-label').textContent = eveActive ? 'Attacker (Eve) Active' : 'Enable Attacker (Eve)';
  buildViz();
}

// ════════════════════════════════════════
//  LOGS
// ════════════════════════════════════════
function clearLogs() {
  document.getElementById('logs-body').innerHTML = `<div class="log-empty" id="log-empty">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    System ready. Select an algorithm and run simulation.
  </div>`;
}

function addLog(msg, type='info') {
  const body = document.getElementById('logs-body');
  const empty = document.getElementById('log-empty');
  if (empty) empty.remove();
  const d = document.createElement('div');
  d.className = `log-entry ${type}`;
  const t = new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.innerHTML = `<span class="log-time">[${t}]</span>${msg}`;
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
}

function autoLog(t) {
  if (t.cat === 'geometry-ecc') {
    if (t.id === 'ecc') {
      addLog('ECC Point Addition: P + Q = R. Draw line through P,Q; intersect curve at −R; reflect over x-axis → R.', 'info');
      addLog('Security: given P and kP, finding k is the ECDLP — no polynomial-time algorithm known.', 'info');
    }
    if (t.id === 'hasse') {
      const hp = parseInt(params.hasse?.p) || 23;
      const bound = 2*Math.sqrt(hp);
      addLog(`Hasse Bounds for p=${hp}: N ∈ [${hp+1-Math.floor(bound)}, ${hp+1+Math.floor(bound)}]`, 'info');
      addLog(`2√p = 2√${hp} ≈ ${bound.toFixed(4)}. Use Schoof's algorithm to compute #E(𝔽p) exactly.`, 'math');
    }
  }
  if (t.cat === 'geometry-lattice') {
    if (t.id === 'cvp') {
      const v1 = parseVec(params.cvp?.v1 || '[4,1]'), v2 = parseVec(params.cvp?.v2 || '[1,3]');
      const w  = parseVec(params.cvp?.w  || '[5.2,3.8]');
      const res = babaiCVP(v1, v2, w);
      const H = hadamard(v1, v2);
      addLog(`Babai CVP: w=${JSON.stringify(w)}, t₁=${res.t1.toFixed(3)}, t₂=${res.t2.toFixed(3)}`, 'math');
      addLog(`Rounded: a₁=${res.a1}, a₂=${res.a2} → lattice point v=(${res.v[0].toFixed(2)}, ${res.v[1].toFixed(2)})`, 'math');
      addLog(`Distance ‖w−v‖ = ${res.dist.toFixed(4)}. Hadamard H(B) = ${H.toFixed(4)} (${H>0.7?'good':'poor'} basis)`, H>0.7?'success':'warn');
    }
    if (t.id === 'svp') {
      const v1 = parseVec(params.svp?.v1 || '[3,1]'), v2 = parseVec(params.svp?.v2 || '[2,5]');
      const red = gaussReduce([...v1],[...v2]);
      addLog(`Gauss reduction of v₁=(${v1}), v₂=(${v2}):`, 'info');
      red.steps.forEach(s => addLog('  ' + s, 'math'));
      addLog(`Shortest vector: (${red.v1[0]},${red.v1[1]})  ‖v₁‖ = ${vecNorm(red.v1).toFixed(4)}`, 'success');
    }
  }
}

function onParamChange() {
  const t = TOPICS.find(x => x.id === activeTopic);
  buildViz();
  clearLogs();
  autoLog(t);
}

// ════════════════════════════════════════
//  SIMULATION ENGINE
// ════════════════════════════════════════
function setRunBtn(running) {
  const btn = document.getElementById('run-btn');
  btn.disabled = running;
  btn.innerHTML = running
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Simulating…`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> Run Transmission Simulation`;
}

function movePkt(x, y, label) {
  const pkt = document.getElementById('net-packet');
  const circ = document.getElementById('pkt-circle');
  const bg   = document.getElementById('pkt-label-bg');
  const txt  = document.getElementById('pkt-label');
  if (!pkt) return;
  pkt.style.opacity = '1';
  circ.setAttribute('cx', x); circ.setAttribute('cy', y);
  bg.setAttribute('x', x-45); bg.setAttribute('y', y-50);
  txt.setAttribute('x', x); txt.setAttribute('y', y-34);
  if (label !== undefined) txt.textContent = label;
}

function hidePkt() {
  const el = document.getElementById('net-packet');
  if (el) el.style.opacity = '0';
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runSimulation() {
  if (simRunning) return;
  simRunning = true;
  clearLogs();
  setRunBtn(true);
  const t = TOPICS.find(x => x.id === activeTopic);
  const p = params[t.id];
  buildViz();

  // ── NTRU ──
  if (t.id === 'ntru') {
    addLog(`Bob publishes NTRU parameters: p=${p.p}, q=${p.q}.`, 'bob');
    addLog(`Alice selects message m(x) = [${p.m}], blinding poly r(x) = [${p.r}].`, 'alice');
    await delay(700);
    addLog(`Alice computes c(x) = ${p.p}·r(x)·h(x) + m(x)  mod ${p.q}`, 'math');
    addLog(`Ciphertext c(x) sent over channel.`, 'alice');
    movePkt(PA.x, PA.y, 'c(x)');
    await delay(1200);
    movePkt((PA.x+PB.x)/2, PA.y, 'c(x)');
    await delay(800);
    if (eveActive) {
      movePkt(PE.x, PE.y, 'c(x)');
      addLog('⚠ Eve intercepts c(x)!', 'eve');
      await delay(700);
      addLog(`Eve must solve SVP on a high-dimensional lattice to find m(x) without Bob's private f(x). NP-Hard — computationally infeasible.`, 'eve');
      await delay(1200);
    }
    movePkt(PB.x, PB.y, 'c(x)');
    await delay(900);
    addLog(`Bob computes a(x) = f(x)·c(x) mod ${p.q}. Reduces mod p=${p.p}.`, 'bob');
    addLog(`Multiplies by f⁻¹(x) mod p to recover m(x) = [${p.m}].`, 'bob');
    await delay(600);
    hidePkt();
    addLog(`✓ Bob successfully decrypted message: m(x) = [${p.m}]`, 'success');
  }

  // ── FHE ──
  else if (t.id === 'fhe') {
    const a = Number(p.a), b = Number(p.b), op = p.op;
    const result = op === '+' ? a + b : a * b;
    const opSym = op === '+' ? '+' : '×';
    addLog(`Alice encrypts a=${a} → E(${a})  and  b=${b} → E(${b}) using LWE noise.`, 'alice');
    movePkt(PA.x, PA.y, `E(${a}),E(${b})`);
    await delay(900);
    addLog(`Alice sends E(${a}), E(${b}) to Cloud Server without revealing a or b.`, 'alice');
    movePkt((PA.x+PB.x)/2, PA.y, '🔒 encrypted');
    await delay(900);
    if (eveActive) {
      movePkt(PE.x, PE.y, '???');
      addLog(`⚠ Eve intercepts but sees only random-looking ciphertext. LWE noise hides all information.`, 'eve');
      await delay(1000);
    }
    movePkt(PB.x, PB.y, 'compute…');
    await delay(800);
    addLog(`Cloud Server (no key!): performs homomorphic ${opSym}: E(${a}) ${opSym} E(${b}) = E(${result})`, 'bob');
    addLog(`Homomorphism: Dec(E(a) ${opSym} E(b)) = a ${opSym} b = ${result}`, 'math');
    await delay(900);
    movePkt((PB.x+PA.x)/2, PA.y, `E(${result})`);
    await delay(900);
    movePkt(PA.x, PA.y, `E(${result})`);
    await delay(700);
    addLog(`Alice decrypts E(${result}) using her secret key → ${a} ${opSym} ${b} = ${result}`, 'alice');
    hidePkt();
    await delay(400);
    addLog(`✓ Computed ${a} ${opSym} ${b} = ${result} — Cloud never saw the raw values!`, 'success');
  }

  // ── ECDH ──
  else if (t.id === 'ecdh') {
    const a = parseInt(p.a)||12, b = parseInt(p.b)||7;
    const secret = a*b;
    addLog(`Alice selects private key a=${a}. Computes public A = ${a}·G.`, 'alice');
    addLog(`Bob selects private key b=${b}. Computes public B = ${b}·G.`, 'bob');
    await delay(800);
    movePkt(PA.x, PA.y, `A=${a}G`);
    await delay(700);
    movePkt((PA.x+PB.x)/2, PA.y, `A=${a}G`);
    await delay(700);
    if (eveActive) {
      movePkt(PE.x, PE.y, `A=${a}G`);
      addLog(`⚠ Eve intercepts A=${a}G and B=${b}G. Must compute a from a·G — this is ECDLP, computationally infeasible!`, 'eve');
      await delay(1200);
    }
    movePkt(PB.x, PB.y, `A=${a}G`);
    await delay(800);
    movePkt((PB.x+PA.x)/2, PA.y, `B=${b}G`);
    await delay(800);
    movePkt(PA.x, PA.y, `B=${b}G`);
    await delay(700);
    addLog(`Alice: S = a·B = ${a}·(${b}G) = ${secret}G`, 'alice');
    addLog(`Bob:   S = b·A = ${b}·(${a}G) = ${secret}G`, 'bob');
    addLog(`Both derive identical shared secret = ${secret}·G`, 'math');
    hidePkt();
    await delay(300);
    addLog(`✓ Shared secret S = ${secret}G established. Use as AES key via KDF.`, 'success');
  }

  // ── GGH ──
  else if (t.id === 'ggh') {
    const m = p.m, r = p.r;
    addLog(`Alice generates good orthogonal basis V (private key). Computes bad basis W = U·V, det(U)=1.`, 'alice');
    addLog(`Alice publishes W (bad basis, low Hadamard ratio) as public key.`, 'alice');
    await delay(900);
    addLog(`Bob's plaintext vector m=${m}. Noise vector r=${r} (δ-small perturbation).`, 'bob');
    addLog(`Bob computes ciphertext: c = m·W + r`, 'bob');
    addLog(`c is NOT on the lattice — it's near lattice point m·W.`, 'math');
    movePkt(PA.x, PA.y, 'c=mW+r');
    await delay(900);
    movePkt((PA.x+PB.x)/2, PA.y, 'c=mW+r');
    await delay(800);
    if (eveActive) {
      movePkt(PE.x, PE.y, 'c=mW+r');
      addLog(`⚠ Eve applies Babai with BAD basis W. Low Hadamard ratio → rounding fails → wrong lattice point. CVP unsolvable with W!`, 'eve');
      await delay(1300);
    }
    movePkt(PB.x, PB.y, 'c=mW+r');
    await delay(800);
    addLog(`Alice uses Babai's Algorithm with GOOD basis V (high Hadamard ratio ≈ 1):`, 'alice');
    addLog(`c = t₁v₁+…+tₙvₙ → round each tᵢ → get mW (noise r removed by rounding!)`, 'math');
    addLog(`Multiply by W⁻¹ → recover m = ${m}.`, 'alice');
    hidePkt();
    await delay(400);
    addLog(`✓ Alice recovered plaintext vector m = ${m}`, 'success');
  }

  simRunning = false;
  setRunBtn(false);
}

  buildSidebar();
  const t = TOPICS[0];
  buildParams(t);
  buildBreakdown(t);
  buildViz();
  autoLog(t);
})();
